services:
  db:
    image: pgvector/pgvector:pg17
    container_name: jobos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobos
      POSTGRES_PASSWORD: jobos
      POSTGRES_DB: jobos
    ports:
      - "5432:5432"
    volumes:
      - jobos-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobos -d jobos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jobos-db-data:
