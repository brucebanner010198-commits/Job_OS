name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: jobos
          POSTGRES_PASSWORD: jobos
          POSTGRES_DB: jobos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://jobos:jobos@localhost:5432/jobos?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare database
        run: npx prisma migrate deploy && npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Integrations tests
        run: npm run test:integrations

      - name: Run invariant tests
        run: |
          npm run test:provenance
          npm run test:goals
          npm run test:scoring
          npm run test:jobs
          npm run test:brief
          npm run test:brief-web-research
          npm run test:crunchbase
          npm run test:apply
          npm run test:apply-state
          npm run test:screening
          npm run test:resume-skim
          npm run test:resume-import
          npm run test:track
          npm run test:track-classify
          npm run test:warm
          npm run test:followup
          npm run test:salary
          npm run test:backup
          npm run test:outcomes
          npm run test:security
          npm run test:profiles
          npm run test:autopilot
          npm run test:hire-probability
          npm run test:knowledge
          npm run test:apply-driver
          npm run test:apply-router
          npm run test:interview
          npm run test:interview-guard
          npm run test:voice
          npm run test:coverletter-standards
          npm run test:competitor-fixes
          npm run test:job-training
          npm run test:onboarding
          npm run test:linkedin
          npm run test:push
          npm run test:career-agent
          npm run test:desktop
          npm run test:e2e-journey
